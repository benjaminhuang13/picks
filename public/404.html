<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Picks</title>
  <script>
    // SPA redirect: store path in sessionStorage, redirect to root
    var path = window.location.pathname || '/';
    sessionStorage.setItem('redirect', path + window.location.search);
    window.location.replace('/');
  </script>
</head>
<body></body>
</html>
